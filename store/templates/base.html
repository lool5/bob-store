
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>WinDon Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    
    <!-- ========== ADDED STYLING (without any change to original structure) ========== -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---------- GLOBAL REFINEMENTS ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Cairo', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f5f7fc 0%, #eef2f8 100%);
            transition: all 0.2s ease;
        }

        /* RTL specific fine-tuning */
        body[dir="rtl"] {
            font-family: 'Cairo', 'Inter', system-ui, sans-serif;
            text-align: right;
        }

        body[dir="ltr"] {
            text-align: left;
        }

        /* custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #FFD966;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffc107;
        }

        /* ---------- NAVBAR MAGIC (preserving bg-black but enhancing) ---------- */
        .bg-black {
            background: #0a0a0a !important;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,240,0.05);
            border-bottom: 1px solid rgba(255, 217, 102, 0.25);
        }

        .navbar-brand {
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFE5A3 80%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent !important;
            text-shadow: 0 2px 3px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .navbar-brand:hover {
            transform: scale(1.02);
        }

        /* navbar buttons (outline-light + special touches) */
        .navbar .btn-outline-light {
            border-radius: 40px;
            padding: 6px 20px;
            font-weight: 600;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border-width: 1.5px;
            letter-spacing: 0.3px;
        }
        .navbar .btn-outline-light:hover {
            background: #FFD966;
            border-color: #FFD966;
            color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px -6px rgba(0,0,0,0.3);
        }
        .btn-warning {
            background: #FFD966;
            border: none;
            font-weight: 600;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .btn-warning:hover {
            background: #FFC107;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(255, 217, 102, 0.3);
        }
        .btn-danger {
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Language buttons (AR / EN) inside navbar */
        nav .btn-outline-light.me-2:last-of-type,
        nav .btn-outline-light:last-child {
            background: rgba(255, 217, 102, 0.12);
            border-color: rgba(255, 217, 102, 0.6);
            color: #FFE5A3;
        }
        nav .btn-outline-light.me-2:last-of-type:hover,
        nav .btn-outline-light:last-child:hover {
            background: #FFD966;
            color: #000;
            border-color: #FFD966;
        }

        /* ---------- MAIN CONTENT AREA (dynamic blocks) ---------- */
        .container.mt-5.mb-5 {
            animation: fadeSlideUp 0.45s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* style for potential product cards, titles, or any content from backend */
        .container.mt-5.mb-5 h1, 
        .container.mt-5.mb-5 h2,
        .container.mt-5.mb-5 h3 {
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(120deg, #1e2a3a, #2c3e4e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        body[dir="rtl"] .container.mt-5.mb-5 h1,
        body[dir="rtl"] .container.mt-5.mb-5 h2 {
            background: linear-gradient(120deg, #2c3e4e, #1e2a3a);
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* elegant card styling for any .card or .product-card that might appear */
        .card, [class*="card"] {
            border: none;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .card:hover, [class*="card"]:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 40px -12px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 217, 102, 0.4);
        }

        /* general buttons styling */
        .btn {
            border-radius: 40px;
            font-weight: 600;
            padding: 8px 24px;
            transition: all 0.2s;
        }
        
        /* improving links & interactive elements */
        a {
            transition: all 0.2s;
        }

        /* ---------- FOOTER ENHANCEMENTS (luxe finish) ---------- */
        footer.bg-black {
            background: #07090c !important;
            border-top: 1px solid rgba(255, 217, 102, 0.25);
            position: relative;
            overflow: hidden;
        }
        footer.bg-black::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(255,217,102,0.03) 0%, rgba(0,0,0,0) 80%);
            pointer-events: none;
        }
        footer h2 {
            font-weight: 800;
            background: linear-gradient(135deg, #FFE5A3, #FFD966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        footer p {
            color: #b9b9b9;
            font-weight: 400;
        }
        footer .btn-success, footer .btn-primary, footer .btn-dark {
            border-radius: 60px;
            padding: 10px 28px;
            font-weight: 600;
            transition: all 0.25s;
            border: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        footer .btn-success:hover {
            background: #25D366;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -10px #25D36660;
        }
        footer .btn-primary:hover {
            background: #1877F2;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -10px #1877F280;
        }
        footer .btn-dark:hover {
            background: #111;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -10px #00000080;
        }

        /* RTL fine adjustments for footer and navbar */
        body[dir="rtl"] .navbar .btn-outline-light {
            margin-left: 6px;
            margin-right: 0;
        }
        body[dir="rtl"] .me-2 {
            margin-right: 0 !important;
            margin-left: 0.5rem !important;
        }
        body[dir="rtl"] .ms-auto {
            margin-right: auto !important;
            margin-left: 0 !important;
        }
        body[dir="rtl"] .container.text-center {
            text-align: center;
        }

        /* subtle glow for active language state */
        .btn-outline-light:active, .btn-outline-light:focus {
            box-shadow: 0 0 0 3px rgba(255, 217, 102, 0.5);
        }

        /* make the whole page more spacious & fresh */
        .container {
            max-width: 1280px;
        }

        /* adding brand pattern to body background (optional elegance) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(255,217,102,0.03) 2%, transparent 2.5%);
            background-size: 35px 35px;
            pointer-events: none;
            z-index: -1;
        }

        /* better spacing for content area when no dynamic content yet */
        .mt-5 {
            margin-top: 3rem !important;
        }
        .mb-5 {
            margin-bottom: 3rem !important;
        }

        /* responsive adjustments */
        @media (max-width: 768px) {
            .navbar .btn-outline-light {
                padding: 4px 14px;
                font-size: 0.85rem;
            }
            footer .btn-success, footer .btn-primary, footer .btn-dark {
                padding: 8px 18px;
                font-size: 0.8rem;
            }
            footer h2 {
                font-size: 1.8rem;
            }
        }
    </style>
    <!-- ========== END OF ADDED STYLING (original code untouched) ========== -->

</head>

<body style="
background:#f1f1f1;
min-height:100vh;
display:flex;
flex-direction:column;
">

    <!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-black shadow">

    <div class="container">

        <a class="navbar-brand fs-3 fw-bold"
           href="/">

            WinDon

        </a>

        <div>
        
            <a href="/"
            class="btn btn-outline-light me-2"
            id="home-btn">

                Home

            </a>

            {% if user.is_authenticated %}

           <a href="/dashboard/"
                class="btn btn-warning me-2"
                id="dashboard-btn">

                Dashboard

            </a>

            <a href="/admin-logout/"
                class="btn btn-danger"
                id="logout-btn">
                Logout

            </a>

            {% endif %}

        </div>

    </div>
    <button onclick="setArabic()"
        class="btn btn-outline-light me-2">

    AR

</button>

<button onclick="setEnglish()"
        class="btn btn-outline-light">

    EN

</button>

</nav>


    <!-- CONTENT -->

<div class="container mt-5 mb-5">

    {% block content %}

    {% endblock %}

</div>


    <!-- FOOTER -->

<footer class="bg-black text-white mt-auto p-5">

    <div class="container text-center">

       <h2 class="fw-bold"
            id="footer-title">

            WinDon Store

        </h2>

       <p class="mt-3"
        id="footer-desc">

            Premium Clothing Brand

        </p>

        <div class="mt-4">

            <a href="#"
               class="btn btn-success me-2">

                WhatsApp

            </a>

            <a href="#"
               class="btn btn-primary me-2">

                Facebook

            </a>

            <a href="#"
               class="btn btn-dark">

                TikTok

            </a>

        </div>

    </div>

</footer>
<script>

function setArabic() {

    localStorage.setItem("lang", "ar");

    applyLanguage();
}

function setEnglish() {

    localStorage.setItem("lang", "en");

    applyLanguage();
}

function applyLanguage() {

    let lang = localStorage.getItem("lang");

    // الاتجاه

    if(lang == "ar") {

        document.body.dir = "rtl";

        document.documentElement.lang = "ar";

    } else {

        document.body.dir = "ltr";

        document.documentElement.lang = "en";
    }

    // HOME BUTTON

    let homeBtn =
    document.getElementById("home-btn");

    if(homeBtn){

        homeBtn.innerText =
        lang == "ar" ? "الرئيسية" : "Home";
    }

    // DASHBOARD BUTTON

    let dashboardBtn =
    document.getElementById("dashboard-btn");

    if(dashboardBtn){

        dashboardBtn.innerText =
        lang == "ar" ? "لوحة التحكم" : "Dashboard";
    }

    // LOGOUT BUTTON

    let logoutBtn =
    document.getElementById("logout-btn");

    if(logoutBtn){

        logoutBtn.innerText =
        lang == "ar" ? "تسجيل الخروج" : "Logout";
    }

    // PRODUCTS TITLE

    let productsTitle =
    document.getElementById("products-title");

    if(productsTitle){

        productsTitle.innerText =
        lang == "ar" ? "منتجاتنا" : "Our Products";
    }

    // FOOTER TITLE

    let footerTitle =
    document.getElementById("footer-title");

    if(footerTitle){

        footerTitle.innerText =
        lang == "ar"
        ? "متجر ويندون"
        : "WinDon Store";
    }

    // FOOTER DESCRIPTION

    let footerDesc =
    document.getElementById("footer-desc");

    if(footerDesc){

        footerDesc.innerText =
        lang == "ar"
        ? "أفضل براند ملابس"
        : "Premium Clothing Brand";
    }
}

window.onload = applyLanguage;

</script>


</body>

</html>
