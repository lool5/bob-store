{% extends 'base.html' %}

{% block content %}

<h1 class="mb-5 text-center"
    id="products-title"
    data-i18n="products_title">

    Our Products

</h1>

<div class="row">

    {% for product in products %}

    <div class="col-md-4 mb-4">

        <div class="card shadow h-100">

            <img src="{{ product.image.url }}"
                 class="card-img-top"
                 height="350"
                 style="object-fit:cover;">

            <div class="card-body d-flex flex-column">

                <h3 class="product-name" data-en="{{ product.name }}" data-ar="{{ product.name_ar|default:product.name }}">
                    {{ product.name }}
                </h3>

                <p class="product-desc flex-grow-1" data-en="{{ product.description }}" data-ar="{{ product.description_ar|default:product.description }}">
                    {{ product.description }}
                </p>

                <h4 class="text-success">
                    {{ product.price }} EGP
                </h4>

                <a href="/product/{{ product.id }}/"
                   class="btn btn-dark w-100 mt-3"
                   data-i18n="order_now">

                    Order Now

                </a>

            </div>

        </div>

    </div>

    {% endfor %}

</div>

<script>
    // Handle dynamic product name/description translation based on language
    function updateProductTexts() {
        const lang = localStorage.getItem("lang") || "en";
        document.querySelectorAll('.product-name').forEach(el => {
            const text = lang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            if (text) el.textContent = text;
        });
        document.querySelectorAll('.product-desc').forEach(el => {
            const text = lang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            if (text) el.textContent = text;
        });
    }
    
    window.addEventListener('languageChanged', updateProductTexts);
    document.addEventListener('DOMContentLoaded', updateProductTexts);
</script>

{% endblock %}
