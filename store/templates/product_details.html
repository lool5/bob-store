{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-6">

        <img src="{{ product.image.url }}"
             class="img-fluid rounded shadow">

    </div>

    <div class="col-md-6">

        <h1>
            {{ product.name }}
        </h1>

        <p>
            {{ product.description }}
        </p>

        <h2 class="text-success">
            {{ product.price }} EGP
        </h2>

        <hr>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-dark w-100">

                Order Now

            </button>

        </form>

    </div>

</div>

{% endblock %}
