{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-6">

        <img src="{{ product.image.url }}"
             class="img-fluid rounded shadow">

    </div>

    <div class="col-md-6">

        <h1 class="product-name" data-en="{{ product.name }}" data-ar="{{ product.name_ar|default:product.name }}">
            {{ product.name }}
        </h1>

        <p class="product-desc" data-en="{{ product.description }}" data-ar="{{ product.description_ar|default:product.description }}">
            {{ product.description }}
        </p>

        <h2 class="text-success">
            {{ product.price }} EGP
        </h2>

        <hr>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-dark w-100"
                    data-i18n="order_now">

                Order Now

            </button>

        </form>

    </div>

</div>

<script>
    function updateProductDetails() {
        const lang = localStorage.getItem("lang") || "en";
        const nameEl = document.querySelector('.product-name');
        const descEl = document.querySelector('.product-desc');
        if (nameEl) {
            const text = lang === 'ar' ? nameEl.getAttribute('data-ar') : nameEl.getAttribute('data-en');
            if (text) nameEl.textContent = text;
        }
        if (descEl) {
            const text = lang === 'ar' ? descEl.getAttribute('data-ar') : descEl.getAttribute('data-en');
            if (text) descEl.textContent = text;
        }
    }
    window.addEventListener('languageChanged', updateProductDetails);
    document.addEventListener('DOMContentLoaded', updateProductDetails);
</script>

{% endblock %}
