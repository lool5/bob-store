{% extends 'base.html' %}

{% block content %}

<h1 class="mb-4"
    data-i18n="dashboard">
    Dashboard
</h1>

<a href="/add-product/"
   class="btn btn-success"
   data-i18n="add_product">

    Add Product

</a>

<a href="/orders/"
   class="btn btn-dark"
   data-i18n="orders_title">

    Orders

</a>

<a href="/admin-logout/"
   class="btn btn-danger"
   data-i18n="logout">

    Logout

</a>

<hr>

<div class="row">

{% for product in products %}

<div class="col-md-4 mb-4">

    <div class="card shadow h-100">

        <img src="{{ product.image.url }}"
             class="card-img-top"
             height="300"
             style="object-fit:cover;">

        <div class="card-body d-flex flex-column">

            <h3 class="product-name" data-en="{{ product.name }}" data-ar="{{ product.name_ar|default:product.name }}">
                {{ product.name }}
            </h3>

            <h4 class="mt-2">
                {{ product.price }} EGP
            </h4>

            <a href="/delete-product/{{ product.id }}/"
               class="btn btn-danger w-100 mt-3"
               data-i18n="delete_btn">

                Delete

            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

<script>
    function updateDashboardNames() {
        const lang = localStorage.getItem("lang") || "en";
        document.querySelectorAll('.product-name').forEach(el => {
            const text = lang === 'ar' ? el.getAttribute('data-ar') : el.getAttribute('data-en');
            if (text) el.textContent = text;
        });
    }
    window.addEventListener('languageChanged', updateDashboardNames);
    document.addEventListener('DOMContentLoaded', updateDashboardNames);
</script>

{% endblock %}
