{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg border-0"
             style="border-radius:25px;">

            <div class="card-body p-5">

                <h1 class="text-center fw-bold mb-4"
                    data-i18n="add_product">

                    Add Product

                </h1>

                <p class="text-center text-muted mb-5"
                   data-i18n="add_product_desc">

                    Add new clothing product to your store

                </p>

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-4">

                        <label class="form-label fw-bold"
                               data-i18n="product_name">

                            Product Name

                        </label>

                        {{ form.name }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold"
                               data-i18n="description">

                            Description

                        </label>

                        {{ form.description }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold"
                               data-i18n="price">

                            Price

                        </label>

                        {{ form.price }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold"
                               data-i18n="product_image">

                            Product Image

                        </label>

                        {{ form.image }}

                    </div>

                    <button class="btn btn-dark btn-lg w-100"
                            data-i18n="submit_add">

                        Add Product

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Add placeholder translations for form fields -->
<script>
    function translateFormPlaceholders() {
        const lang = localStorage.getItem("lang") || "en";
        const placeholders = {
            en: {
                name: "e.g. Classic Leather Jacket",
                description: "Describe the product details...",
                price: "e.g. 499"
            },
            ar: {
                name: "مثال: جلد كلاسيكي",
                description: "اكتب وصف المنتج...",
                price: "مثال: 499"
            }
        };
        const nameInput = document.querySelector('input[name="name"]');
        const descInput = document.querySelector('textarea[name="description"]');
        const priceInput = document.querySelector('input[name="price"]');
        if(nameInput) nameInput.placeholder = placeholders[lang].name;
        if(descInput) descInput.placeholder = placeholders[lang].description;
        if(priceInput) priceInput.placeholder = placeholders[lang].price;
    }
    window.addEventListener('languageChanged', translateFormPlaceholders);
    document.addEventListener('DOMContentLoaded', translateFormPlaceholders);
</script>

{% endblock %}
