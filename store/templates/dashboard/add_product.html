{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg border-0"
             style="border-radius:25px;">

            <div class="card-body p-5">

                <h1 class="text-center fw-bold mb-4">

                    Add Product

                </h1>

                <p class="text-center text-muted mb-5">

                    Add new clothing product to your store

                </p>

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Product Name

                        </label>

                        {{ form.name }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Description

                        </label>

                        {{ form.description }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Price

                        </label>

                        {{ form.price }}

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-bold">

                            Product Image

                        </label>

                        {{ form.image }}

                    </div>

                    <button class="btn btn-dark btn-lg w-100">

                        Add Product

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
