<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login - WinDon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        body[dir="rtl"] {
            font-family: 'Cairo', 'Inter', sans-serif;
            text-align: right;
        }
        .login-card {
            width: 420px;
            border-radius: 32px;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(2px);
            box-shadow: 0 30px 45px -20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            overflow: hidden;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .btn-gold {
            background: #FFD966;
            color: #000;
            font-weight: 700;
            border-radius: 50px;
            padding: 12px;
            transition: all 0.2s;
        }
        .btn-gold:hover {
            background: #ffc107;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(255,217,102,0.4);
        }
        .lang-btn {
            background: rgba(0,0,0,0.08);
            border: 1px solid #ddd;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn:hover {
            background: #FFD966;
            border-color: #FFD966;
        }
        input {
            border-radius: 28px !important;
            padding: 12px 18px !important;
            border: 1px solid #ccc;
        }
        input:focus {
            border-color: #FFD966;
            box-shadow: 0 0 0 3px rgba(255,217,102,0.3);
        }
    </style>

</head>

<body>

    <div class="login-card p-5">

        <div class="text-center mb-4">
            <h1 class="fw-bold" id="login-title">WinDon Admin</h1>
            <p class="text-muted" id="login-subtitle">Secure Dashboard Login</p>
        </div>

        <div class="d-flex justify-content-center gap-2 mb-4">
            <button onclick="setArabic()" class="lang-btn">عربي</button>
            <button onclick="setEnglish()" class="lang-btn">English</button>
        </div>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   id="username-input"
                   placeholder="Username"
                   class="form-control form-control-lg mb-3">

            <input type="password"
                   name="password"
                   id="password-input"
                   placeholder="Password"
                   class="form-control form-control-lg mb-4">

            <button class="btn btn-gold btn-lg w-100" id="login-btn">
                Login
            </button>

        </form>

    </div>

    <script>
        const loginTranslations = {
            en: {
                title: "WinDon Admin",
                subtitle: "Secure Dashboard Login",
                username: "Username",
                password: "Password",
                login: "Login"
            },
            ar: {
                title: "مدير ويندون",
                subtitle: "دخول آمن للوحة التحكم",
                username: "اسم المستخدم",
                password: "كلمة المرور",
                login: "تسجيل الدخول"
            }
        };

        function setArabic() {
            localStorage.setItem("lang", "ar");
            applyLoginLanguage();
        }

        function setEnglish() {
            localStorage.setItem("lang", "en");
            applyLoginLanguage();
        }

        function applyLoginLanguage() {
            let lang = localStorage.getItem("lang");
            if (lang !== "ar" && lang !== "en") lang = "en";
            
            if (lang === "ar") {
                document.body.dir = "rtl";
                document.body.style.fontFamily = "'Cairo', 'Inter', sans-serif";
            } else {
                document.body.dir = "ltr";
                document.body.style.fontFamily = "'Inter', 'Cairo', sans-serif";
            }
            
            document.getElementById("login-title").innerText = loginTranslations[lang].title;
            document.getElementById("login-subtitle").innerText = loginTranslations[lang].subtitle;
            document.getElementById("username-input").placeholder = loginTranslations[lang].username;
            document.getElementById("password-input").placeholder = loginTranslations[lang].password;
            document.getElementById("login-btn").innerText = loginTranslations[lang].login;
        }

        window.onload = applyLoginLanguage;
    </script>

</body>

</html>
