<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob Clothing – Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Poppins','Cairo',sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .login-card{
            width:440px;
            border-radius:36px;
            background:rgba(255,255,255,0.98);
            box-shadow:0 30px 45px -15px rgba(0,0,0,0.4);
            transition:transform 0.2s;
            overflow:hidden;
        }
        .login-card:hover{transform:translateY(-5px);}
        .btn-gold{
            background:#3b82f6;
            color:white;
            font-weight:700;
            border-radius:50px;
            padding:12px;
            transition:all 0.2s;
            border:none;
        }
        .btn-gold:hover{
            background:#2563eb;
            transform:translateY(-2px);
            box-shadow:0 10px 20px -8px #3b82f6;
        }
        .lang-btn{
            background:rgba(0,0,0,0.08);
            border:1px solid #cbd5e1;
            border-radius:40px;
            padding:6px 18px;
            font-weight:600;
        }
        .lang-btn:hover{background:#3b82f6;color:white;border-color:#3b82f6;}
        input{
            border-radius:28px!important;
            padding:12px 18px!important;
            border:1px solid #cbd5e1;
        }
        input:focus{
            border-color:#3b82f6;
            box-shadow:0 0 0 3px rgba(59,130,246,0.3);
        }
    </style>
</head>
<body>
    <div class="login-card p-5">
        <div class="text-center mb-4">
            <i class="fas fa-tshirt fa-3x text-primary mb-3"></i>
            <h1 class="fw-bold" id="login-title">Bob Admin</h1>
            <p class="text-muted" id="login-subtitle">Secure Dashboard Login</p>
        </div>
        <div class="d-flex justify-content-center gap-2 mb-4">
            <button onclick="setArabic()" class="lang-btn"><i class="fas fa-language me-1"></i> عربي</button>
            <button onclick="setEnglish()" class="lang-btn">English</button>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'store:admin_login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <i class="fas fa-user me-2 text-secondary"></i>
                <input type="text" name="username" id="username-input" placeholder="Username" class="form-control form-control-lg">
            </div>
            <div class="mb-4">
                <i class="fas fa-lock me-2 text-secondary"></i>
                <input type="password" name="password" id="password-input" placeholder="Password" class="form-control form-control-lg">
            </div>
            <button class="btn btn-gold btn-lg w-100" id="login-btn">
                <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>
        </form>
    </div>

    <script>
        const loginTranslations = {
            en: { title: "Bob Admin", subtitle: "Secure Dashboard Login", username: "Username", password: "Password", login: "Login" },
            ar: { title: "مدير بوب", subtitle: "دخول آمن للوحة التحكم", username: "اسم المستخدم", password: "كلمة المرور", login: "تسجيل الدخول" }
        };
        function setArabic() { localStorage.setItem("lang", "ar"); applyLoginLanguage(); }
        function setEnglish() { localStorage.setItem("lang", "en"); applyLoginLanguage(); }
        function applyLoginLanguage() {
            let lang = localStorage.getItem("lang");
            if (!["ar","en"].includes(lang)) lang = "en";
            document.body.dir = lang === "ar" ? "rtl" : "ltr";
            document.body.style.fontFamily = lang === "ar" ? "'Cairo', 'Poppins', sans-serif" : "'Poppins', 'Cairo', sans-serif";
            document.getElementById("login-title").innerText = loginTranslations[lang].title;
            document.getElementById("login-subtitle").innerText = loginTranslations[lang].subtitle;
            document.getElementById("username-input").placeholder = loginTranslations[lang].username;
            document.getElementById("password-input").placeholder = loginTranslations[lang].password;
            document.getElementById("login-btn").innerHTML = `<i class="fas fa-sign-in-alt me-2"></i> ${loginTranslations[lang].login}`;
        }
        window.onload = applyLoginLanguage;
    </script>
</body>
</html>
